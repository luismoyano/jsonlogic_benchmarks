name: backfill_all

# ONE-SHOT backfill workflow — run once, then delete this file.
# Re-runs ALL historical dates with the current warmup/benchmark settings
# (warmup=10, benchmark=10), generating both non-YJIT and YJIT result files
# and overwriting the old ones (which used warmup=2, benchmark=5).
#
# Known versions per date:
#   2026-02-21: shiny_json_logic 0.2.16, json-logic-rb 0.2.0, json_logic 0.4.7, json_logic_ruby 0.2.4
#   2026-02-22: shiny_json_logic 0.3.0,  json-logic-rb 0.2.0, json_logic 0.4.7, json_logic_ruby 0.2.4
#   2026-03-01: shiny_json_logic 0.3.2,  json-logic-rb 0.2.0, json_logic 0.4.7, json_logic_ruby 0.2.4
#   2026-03-06: shiny_json_logic 0.3.3,  json-logic-rb 0.2.0, json_logic 0.4.7, json_logic_ruby 0.2.4

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download test suites
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/download_tests.sh
          ./scripts/download_tests.sh

      - name: Upload test suites artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-suites-backfill
          path: tests/
          retention-days: 1

  backfill:
    needs: setup
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ruby-version: ['2.7', '3.1', '3.2', '3.3', '3.4', '4.0']
        yjit: [false, true]
        date: ['2026-02-21', '2026-02-22', '2026-03-01', '2026-03-06']
        exclude:
          # YJIT requires Ruby >= 3.2
          - ruby-version: '2.7'
            yjit: true
          - ruby-version: '3.1'
            yjit: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download test suites artifact
        uses: actions/download-artifact@v4
        with:
          name: test-suites-backfill
          path: tests/

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: false

      - name: Resolve gem versions for ${{ matrix.date }}
        id: versions
        run: |
          DATE="${{ matrix.date }}"
          if [ "$DATE" = "2026-02-21" ]; then
            echo "shiny_version=0.2.16"           >> "$GITHUB_OUTPUT"
            echo "json_logic_rb_version=0.2.0"    >> "$GITHUB_OUTPUT"
            echo "json_logic_version=0.4.7"       >> "$GITHUB_OUTPUT"
            echo "json_logic_ruby_version=0.2.4"  >> "$GITHUB_OUTPUT"
          elif [ "$DATE" = "2026-02-22" ]; then
            echo "shiny_version=0.3.0"            >> "$GITHUB_OUTPUT"
            echo "json_logic_rb_version=0.2.0"    >> "$GITHUB_OUTPUT"
            echo "json_logic_version=0.4.7"       >> "$GITHUB_OUTPUT"
            echo "json_logic_ruby_version=0.2.4"  >> "$GITHUB_OUTPUT"
          elif [ "$DATE" = "2026-03-01" ]; then
            echo "shiny_version=0.3.2"            >> "$GITHUB_OUTPUT"
            echo "json_logic_rb_version=0.2.0"    >> "$GITHUB_OUTPUT"
            echo "json_logic_version=0.4.7"       >> "$GITHUB_OUTPUT"
            echo "json_logic_ruby_version=0.2.4"  >> "$GITHUB_OUTPUT"
          elif [ "$DATE" = "2026-03-06" ]; then
            echo "shiny_version=0.3.3"            >> "$GITHUB_OUTPUT"
            echo "json_logic_rb_version=0.2.0"    >> "$GITHUB_OUTPUT"
            echo "json_logic_version=0.4.7"       >> "$GITHUB_OUTPUT"
            echo "json_logic_ruby_version=0.2.4"  >> "$GITHUB_OUTPUT"
          fi

      - name: Run benchmark (date=${{ matrix.date }}, yjit=${{ matrix.yjit }})
        run: |
          ruby benchmark_ruby/performance_benchmark.rb \
            ${{ matrix.yjit == true && '--yjit' || '' }} \
            --date "${{ matrix.date }}" \
            --gem-version "shiny_json_logic=${{ steps.versions.outputs.shiny_version }}" \
            --gem-version "json-logic-rb=${{ steps.versions.outputs.json_logic_rb_version }}" \
            --gem-version "json_logic=${{ steps.versions.outputs.json_logic_version }}" \
            --gem-version "json_logic_ruby=${{ steps.versions.outputs.json_logic_ruby_version }}"

      - name: Upload backfill results
        uses: actions/upload-artifact@v4
        with:
          name: backfill-${{ matrix.os }}-ruby-${{ matrix.ruby-version }}-yjit-${{ matrix.yjit }}-${{ matrix.date }}
          path: benchmark_ruby/results/
          retention-days: 1

  commit-results:
    needs: backfill
    runs-on: ubuntu-latest
    if: always() && needs.backfill.result != 'cancelled'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all backfill results
        uses: actions/download-artifact@v4
        with:
          pattern: backfill-*
          path: downloaded-results/
          merge-multiple: false

      - name: Merge results into results directory
        run: |
          for dir in downloaded-results/backfill-*/; do
            if [ -d "$dir" ]; then
              for date_dir in "$dir"*/; do
                if [ -d "$date_dir" ]; then
                  dirname=$(basename "$date_dir")
                  if [[ "$dirname" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
                    mkdir -p "benchmark_ruby/results/$dirname"
                    cp -f "$date_dir"*.json "benchmark_ruby/results/$dirname/" 2>/dev/null || true
                  fi
                fi
              done
            fi
          done

          echo "Backfill results merged:"
          find benchmark_ruby/results -name "*.json" | sort

      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add benchmark_ruby/results/
          git diff --staged --quiet || git commit -m "benchmark: full backfill warmup=10 $(date +%Y-%m-%d)"
          git push
